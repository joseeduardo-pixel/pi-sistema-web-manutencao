{% extends 'base.html' %}

{% block title %}LOGIN{% endblock %}

{% block content %}


<style>
    body {
        background: #f4f6f9;
        font-family: Arial, Helvetica, sans-serif;
    }

    .login-container {
        width: 100%;
        max-width: 400px;
        margin: 80px auto;
        padding: 5px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    .login-container h2 {
        margin-bottom: 20px;
        color: #333;
    }

    form p {
        text-align: left;
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 5px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 100%;
        padding: 8px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 510px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0056b3;
    }

    hr {
        margin: 5px 0;
    }

    .register-link {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
    }

    .register-link:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <h2>🔐 Login</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    <hr>

    <p>Ainda não tem uma conta?</p>
    <a class="register-link" href="{% url 'register' %}">
        Clique aqui para se cadastrar
    </a>
</div>


{% endblock %}
